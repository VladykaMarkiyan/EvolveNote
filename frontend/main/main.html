<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvolveNote</title>
</head>
<body>
    <div class="main-container">

    <div class="top-bar">
        <div class="photo-container">
            <div class="photo-container img">
                <img src="../photo/logo.png" alt="Logo">
            </div>
        </div>

        <div class="auth-buttons">
            <button class="login-btn" id="loginBtn">Увійти</button>
            <button class="register-btn" id="registerBtn">Реєстрація</button>
        </div>
    </div>

    <div class="main-text">
        Створи своє життя з <br>
        цілями, натхненням і <br>
        фокусом
    </div>

    <div class="text">
        Плануй день, відстежуй прогрес, <br>
        зберігай мотивацію — усе в одному місці
    </div>

    <div class="start-button-container">
        <button class="start-btn" id="startBtn">Почати</button>
    </div>

    <div class="features">
        <div class="feature">
            <div class="feature-icon">✔️</div>
            <div class="feature-title">Плануй цілі</div>
            <div class="feature-text">Створюй власні цілі і розбивай їх на кроки</div>
        </div>
        <div class="feature">
            <div class="feature-icon">❝</div>
            <div class="feature-title">Надихайся цитатами</div>
            <div class="feature-text">Щоденна порція мотивації</div>
        </div>
        <div class="feature">
            <div class="feature-icon">📅</div>
            <div class="feature-title">Календар і трекер</div>
            <div class="feature-text">Відстежуй свої досягнення</div>
        </div>
    </div>

</div>
<script src="main.js"></script>
</body>
</html>
